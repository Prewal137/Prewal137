name: Refresh README

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README timestamp
        run: |
          echo "<!-- updated $(date) -->" >> README.md

      - name: Commit changes
        run: |
          git config --global user.name "Prewal137"
          git config --global user.email "prewalfernandes.gorigudda@gmail.com "
          git add README.md
          git commit -m "Auto refresh README" || exit 0
          git push
